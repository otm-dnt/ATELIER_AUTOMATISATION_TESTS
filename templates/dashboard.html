<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Dashboard API Monitoring</title>
  <style>
    body{font-family:Arial;margin:24px}
    table{border-collapse:collapse;width:100%}
    th,td{border:1px solid #ddd;padding:8px}
    th{background:#f5f5f5;text-align:left}
    .ok{color:green;font-weight:bold}
    .ko{color:#b00020;font-weight:bold}
  </style>
</head>
<body>
  <h1>Dashboard - API Monitoring (ipify)</h1>
  <p><a href="/run">▶ Lancer un run</a></p>

  <table>
    <thead>
      <tr>
        <th>Date</th><th>API</th><th>Avg ms</th><th>P95 ms</th><th>Passed</th><th>Failed</th>
      </tr>
    </thead>
    <tbody>
      {% for r in runs %}
      <tr>
        <td>{{r.ts}}</td>
        <td>{{r.api_name}}</td>
        <td>{{"%.1f"|format(r.avg_ms)}}</td>
        <td>{{"%.1f"|format(r.p95_ms)}}</td>
        <td class="ok">{{r.passed}}</td>
        <td class="ko">{{r.failed}}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
